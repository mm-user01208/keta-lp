<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP UIパターン - Pattern A Final</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;color:#333}

.section-steps{padding:80px 24px;max-width:960px;margin:0 auto}
.section-steps h2{text-align:center;font-size:1.4rem;font-weight:700;color:#333;margin-bottom:48px;letter-spacing:.04em}

/* Grid: 4 equal columns */
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;position:relative}

/* Red line through step numbers */
.steps-grid::before{
  content:'';position:absolute;
  top:28px;/* center of 56px circle */
  left:calc(12.5% + 4px);right:calc(12.5% + 4px);
  height:2px;background:#dc003b;z-index:0;
}

/* Each step column */
.step-col{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;position:relative;z-index:1;
}

/* ① Step number (red circle) */
.step-num{
  width:56px;height:56px;border-radius:50%;
  background:#dc003b;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:900;
  box-shadow:0 3px 10px rgba(220,0,59,.2);
  border:3px solid #fff;
  flex-shrink:0;
  margin-bottom:16px;
}

/* ② Icon */
.step-icon{
  width:64px;height:64px;
  display:flex;align-items:center;justify-content:center;
  margin:16px 0;
  flex-shrink:0;
}
.step-icon svg{width:48px;height:48px;stroke:#555;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ③ Title */
.step-title{
  font-size:17px;font-weight:700;color:#333;
  margin-bottom:8px;
  line-height:1.4;
  flex-shrink:0;
}

/* ④ Description - fixed 3 lines */
.step-desc{
  font-size:13px;color:#666;
  line-height:1.6;
  /* Force 3 lines height: 13px * 1.6 * 3 = 62.4px */
  min-height:63px;max-height:63px;
  overflow:hidden;
}

/* SP: 2 columns */
@media(max-width:768px){
  .section-steps{padding:48px 16px}
  .steps-grid{grid-template-columns:repeat(2,1fr);gap:32px 24px}
  .steps-grid::before{display:none}
  .step-desc{min-height:auto;max-height:none}
}
</style>
</head>
<body>

<div class="section-steps">
<h2>K-ETAの申請手順</h2>
<div class="steps-grid">

<div class="step-col">
  <div class="step-num">1</div>
  <div class="step-icon">
    <svg viewBox="0 0 48 48"><path d="M8 6h24l8 8v28a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V6z"/><path d="M32 6v8h8"/><line x1="16" y1="20" x2="32" y2="20"/><line x1="16" y1="26" x2="32" y2="26"/><line x1="16" y1="32" x2="24" y2="32"/></svg>
  </div>
  <div class="step-title">申請書の記入</div>
  <div class="step-desc">利用規約に同意のうえ申請書に必要事項を入力してください</div>
</div>

<div class="step-col">
  <div class="step-num">2</div>
  <div class="step-icon">
    <svg viewBox="0 0 48 48"><rect x="4" y="10" width="40" height="28" rx="3"/><line x1="4" y1="20" x2="44" y2="20"/><rect x="8" y="28" width="12" height="4" rx="1"/></svg>
  </div>
  <div class="step-title">料金のお支払い</div>
  <div class="step-desc">入力内容を確認後クレジットカード情報を入力してください</div>
</div>

<div class="step-col">
  <div class="step-num">3</div>
  <div class="step-icon">
    <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="18"/><polyline points="24,14 24,24 32,28"/></svg>
  </div>
  <div class="step-title">申請内容の審査</div>
  <div class="step-desc">お支払い完了後に受付通知を送信します。審査は最長72時間です</div>
</div>

<div class="step-col">
  <div class="step-num">4</div>
  <div class="step-icon">
    <svg viewBox="0 0 48 48"><path d="M6 10h36a2 2 0 0 1 2 2v24a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2z"/><polyline points="4,10 24,28 44,10"/></svg>
  </div>
  <div class="step-title">審査結果の通知</div>
  <div class="step-desc">審査結果をメールで通知します。渡航前に申請状況をご確認ください</div>
</div>

</div>
</div>

</body>
</html>
