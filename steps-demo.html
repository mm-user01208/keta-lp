<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP UI - ②おすすめ 修正版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#eee;color:#333}

.section-steps{padding:80px 24px;max-width:960px;margin:0 auto;background:#fff7ec;border-radius:16px}
.section-steps h2{text-align:center;font-size:1.3rem;font-weight:700;color:#333;margin-bottom:48px;letter-spacing:.04em}

.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;position:relative;padding-top:28px}
.steps-grid::before{content:'';position:absolute;top:28px;left:calc(12.5%);right:calc(12.5%);height:2px;background:#dc003b;z-index:5}

.step-col{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  background:#fff;border-radius:8px;padding:40px 16px 20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  position:relative;z-index:1;
  transition:box-shadow .2s,transform .2s;transform-origin:center center;
}
.step-col:hover{box-shadow:0 6px 20px rgba(0,0,0,.12);transform:scale(1.03)}

.step-num{
  width:56px;height:56px;border-radius:50%;background:#dc003b;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:900;
  box-shadow:0 4px 10px rgba(0,0,0,.15);border:3px solid #fff;
  position:absolute;top:-28px;left:50%;transform:translateX(-50%);z-index:10;
}

.step-icon{width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin:0 0 10px}
.step-icon svg{width:52px;height:52px;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

.step-title{font-size:17px;font-weight:700;color:#333;margin-bottom:8px;line-height:1.4}
.step-desc{font-size:13px;color:#666;line-height:1.6}

@media(max-width:768px){
  .section-steps{padding:48px 16px;border-radius:0}
  .steps-grid{grid-template-columns:repeat(2,1fr);gap:32px 16px}
  .steps-grid::before{display:none}
}
</style>
</head>
<body>

<div class="section-steps">
<h2>K-ETAの申請手順</h2>
<div class="steps-grid">

<div class="step-col">
  <div class="step-num">1</div>
  <div class="step-icon"><svg viewBox="0 0 48 48" stroke="#c9ad00"><rect x="6" y="10" width="36" height="28" rx="2"/><rect x="10" y="6" width="28" height="4" rx="1"/><line x1="12" y1="18" x2="36" y2="18"/><rect x="12" y="22" width="24" height="12" rx="1"/></svg></div>
  <div class="step-title">申請書記入</div>
  <div class="step-desc">免責事項と利用規約に同意し、K-ETAオンライン申請書に必要事項を入力してください。K-ETAは年齢を問わず取得が必要です。</div>
</div>

<div class="step-col">
  <div class="step-num">2</div>
  <div class="step-icon"><svg viewBox="0 0 48 48" stroke="#134aa9"><rect x="4" y="10" width="40" height="28" rx="3"/><line x1="4" y1="20" x2="44" y2="20"/><rect x="8" y="30" width="14" height="3" rx="1"/><circle cx="38" cy="31.5" r="2"/></svg></div>
  <div class="step-title">お支払い</div>
  <div class="step-desc">申請書の入力内容に間違いがないことを確認したあと、お支払いページに遷移します。クレジットカード情報を入力してください。</div>
</div>

<div class="step-col">
  <div class="step-num">3</div>
  <div class="step-icon"><svg viewBox="0 0 48 48" stroke="#dc003b"><circle cx="24" cy="24" r="20"/><polyline points="24,12 24,24 33,29"/><circle cx="24" cy="24" r="1.5" fill="#dc003b"/></svg></div>
  <div class="step-title">審査</div>
  <div class="step-desc">お支払い完了後に「申請受付通知」を送信します。審査には最長72時間を要しますので、結果が通知されるまでお待ちください。</div>
</div>

<div class="step-col">
  <div class="step-num">4</div>
  <div class="step-icon"><svg viewBox="0 0 48 48" stroke="#ed8906"><path d="M6 10h36a2 2 0 0 1 2 2v24a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2z"/><polyline points="4,10 24,26 44,10"/></svg></div>
  <div class="step-title">結果通知</div>
  <div class="step-desc">審査結果をメールで通知します。渡航前にK-ETA申請状況確認で申請内容に誤りがないかご確認ください。なお、K-ETAは韓国の電子入国申告のひとつです。</div>
</div>

</div>
</div>

</body>
</html>
